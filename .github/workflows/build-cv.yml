name: Build & Deploy CV

on:
  push:
    branches: [main]
    paths:
      - '**.json'
      - 'template.html'
      - 'build_cv.sh'
      - '.github/workflows/build-cv.yml'
  workflow_dispatch:  # eseguibile manualmente dalla UI di GitHub

# Permessi necessari per GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploy paralleli
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build HTML per ogni JSON trovato
        run: |
          mkdir -p dist
          chmod +x build_cv.sh

          # Cerca tutti i .json nella root (esclude package.json e simili)
          for json_file in *.json; do
            # Salta se non esistono file .json
            [[ -f "$json_file" ]] || continue

            # Salta file di config comuni che non sono CV
            case "$json_file" in
              package.json|package-lock.json|tsconfig.json) continue ;;
            esac

            name="${json_file%.json}"
            echo "→ Build: $json_file → dist/${name}.html"
            ./build_cv.sh "$json_file" template.html
            mv resume-out.html "dist/${name}.html"
          done

          echo "--- File generati ---"
          ls -lh dist/

      - name: Upload artifact per Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy su GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
