name: Render and Deploy CV
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install resume-cli and theme (locally)
        run: npm install resume-cli jsonresume-theme-even

      - name: Export CV Italian
        run: npx resume export dist/index.html --theme even --resume resume-it.json

      - name: Export CV English
        run: npx resume export dist/index-en.html --theme even --resume resume-en.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'   # <--- only upload the output files

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
